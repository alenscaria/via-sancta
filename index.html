<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Via Sancta – The Holy Way</title>
  <meta name="description" content="A Catholic spiritual growth tracker. Track Mass, Rosary, Scripture, Prayer, Fasting, and Confession with streaks and reflections." />

  <!-- React & Babel from CDN (no build step needed) -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { background: #0d0a1e; }

    .orb {
      position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0;
    }
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(200,169,110,0.2);
      border-radius: 16px;
      padding: 20px;
      backdrop-filter: blur(10px);
    }
    .check-btn {
      width: 100%; display: flex; align-items: center; gap: 14px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(200,169,110,0.15);
      border-radius: 12px; padding: 14px 16px; cursor: pointer;
      transition: all 0.3s ease; color: #e8dfc8; text-align: left;
    }
    .check-btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(200,169,110,0.4); }
    .check-btn.done { background: rgba(200,169,110,0.12); border-color: rgba(200,169,110,0.5); }
    .check-btn.pulse { animation: pulseGlow 0.6s ease; }
    @keyframes pulseGlow {
      0% { transform: scale(1); }
      50% { transform: scale(1.03); box-shadow: 0 0 24px rgba(200,169,110,0.4); }
      100% { transform: scale(1); }
    }
    .checkmark {
      width: 28px; height: 28px; border-radius: 50%;
      border: 2px solid rgba(200,169,110,0.4);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.3s; font-size: 14px;
    }
    .checkmark.done { background: #c8a96e; border-color: #c8a96e; }
    .tab-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
      background: none; border: none; cursor: pointer; color: rgba(232,223,200,0.4);
      font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 1px;
      padding: 10px 4px; transition: color 0.3s;
    }
    .tab-btn.active { color: #c8a96e; }
    .tab-btn span:first-child { font-size: 20px; }
    .badge-pill {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(200,169,110,0.12); border: 1px solid rgba(200,169,110,0.3);
      border-radius: 24px; padding: 6px 14px; font-size: 13px;
    }
    .badge-pill.locked { opacity: 0.3; filter: grayscale(1); }
    .progress-bar-bg { background: rgba(255,255,255,0.07); border-radius: 99px; overflow: hidden; }
    .progress-bar-fill {
      height: 100%; border-radius: 99px;
      background: linear-gradient(90deg, #c8a96e, #e8dfc8);
      transition: width 0.6s ease;
    }
    textarea {
      width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(200,169,110,0.2);
      border-radius: 10px; padding: 14px; color: #e8dfc8; font-family: 'Crimson Pro', serif;
      font-size: 16px; resize: none; outline: none; line-height: 1.6;
    }
    textarea:focus { border-color: rgba(200,169,110,0.5); }
    .btn-gold {
      background: linear-gradient(135deg, #c8a96e, #a8874e);
      border: none; border-radius: 10px; padding: 12px 24px;
      color: #0d0a1e; font-family: 'Cinzel', serif; font-size: 13px;
      letter-spacing: 1px; cursor: pointer; font-weight: 600; transition: opacity 0.2s;
    }
    .btn-gold:hover { opacity: 0.85; }
    .toast {
      position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
      background: rgba(200,169,110,0.95); color: #0d0a1e;
      padding: 10px 24px; border-radius: 99px;
      font-family: 'Cinzel', serif; font-size: 13px; font-weight: 600;
      z-index: 999; animation: toastIn 0.3s ease;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4); white-space: nowrap;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    .streak-fire { animation: flicker 1.5s infinite alternate; display: inline-block; }
    @keyframes flicker {
      from { transform: scale(1) rotate(-2deg); }
      to   { transform: scale(1.1) rotate(2deg); }
    }
    .section-title {
      font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 3px;
      color: rgba(200,169,110,0.6); text-transform: uppercase; margin-bottom: 14px;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(200,169,110,0.3); border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const SAINTS = [
      { name: "St. Thérèse of Lisieux", quote: "Miss no single opportunity of making some small sacrifice, here by a smiling look, there by a kindly word." },
      { name: "St. Augustine", quote: "Our heart is restless, until it repose in Thee." },
      { name: "St. Francis of Assisi", quote: "Start by doing what's necessary; then do what's possible; and suddenly you are doing the impossible." },
      { name: "St. Thomas Aquinas", quote: "The things that we love tell us what we are." },
      { name: "St. Teresa of Ávila", quote: "Let nothing disturb you, let nothing frighten you. All things pass. God does not change." },
      { name: "St. John Paul II", quote: "Do not be afraid. Open wide the doors for Christ." },
      { name: "St. Padre Pio", quote: "Pray, hope, and don't worry." },
    ];

    const VERSES = [
      { text: "I can do all things through Christ who strengthens me.", ref: "Philippians 4:13" },
      { text: "Be still, and know that I am God.", ref: "Psalm 46:10" },
      { text: "Trust in the Lord with all your heart.", ref: "Proverbs 3:5" },
      { text: "The Lord is my shepherd; I shall not want.", ref: "Psalm 23:1" },
      { text: "For I know the plans I have for you, declares the Lord.", ref: "Jeremiah 29:11" },
      { text: "Love one another as I have loved you.", ref: "John 15:12" },
      { text: "Ask and it will be given to you; seek and you will find.", ref: "Matthew 7:7" },
    ];

    const DAYS_MYSTERY = [null, "Joyful", "Sorrowful", "Glorious", "Luminous", "Joyful", "Sorrowful", "Glorious"];

    const BADGES = [
      { id: "first_step",       icon: "✝️",  name: "First Step",       desc: "Complete your first day",     condition: (s) => s.totalDays >= 1 },
      { id: "week_grace",       icon: "🌟",  name: "Week of Grace",    desc: "7-day streak",                condition: (s) => s.streak >= 7 },
      { id: "rosary_warrior",   icon: "📿",  name: "Rosary Warrior",   desc: "30-day Rosary streak",        condition: (s) => s.rosaryStreak >= 30 },
      { id: "pilgrim",          icon: "🏔️", name: "Pilgrim",          desc: "Reach level Pilgrim",         condition: (s) => s.level >= 2 },
      { id: "confessor",        icon: "🕊️", name: "Confessor",        desc: "Log Confession 3 times",      condition: (s) => s.confessionCount >= 3 },
      { id: "lenten_fast",      icon: "🍞",  name: "Lenten Fast",      desc: "Fast 10 times",               condition: (s) => s.fastCount >= 10 },
      { id: "scripture_scholar",icon: "📖",  name: "Scripture Scholar",desc: "Read Scripture 20 days",      condition: (s) => s.scriptureCount >= 20 },
      { id: "apostle",          icon: "🌹",  name: "Apostle",          desc: "Reach level Apostle",         condition: (s) => s.level >= 4 },
    ];

    const LEVELS = ["Novice", "Pilgrim", "Disciple", "Apostle", "Saint"];

    const PRACTICES = [
      { id: "mass",      icon: "⛪", label: "Daily Mass",        points: 30 },
      { id: "rosary",    icon: "📿", label: "Rosary",            points: 20 },
      { id: "scripture", icon: "📖", label: "Scripture",         points: 15 },
      { id: "prayer",    icon: "🙏", label: "Personal Prayer",   points: 15 },
      { id: "fasting",   icon: "🍞", label: "Fasting / Penance", points: 20 },
      { id: "confession",icon: "🕊️",label: "Confession",        points: 50 },
    ];

    const todayKey = () => new Date().toISOString().slice(0, 10);

    function loadState() {
      try {
        const s = localStorage.getItem("viaSancta");
        return s ? JSON.parse(s) : null;
      } catch { return null; }
    }

    function saveState(s) {
      try { localStorage.setItem("viaSancta", JSON.stringify(s)); } catch {}
    }

    function initState() {
      return {
        checked: {}, streak: 0, rosaryStreak: 0, totalDays: 0, graces: 0,
        confessionCount: 0, fastCount: 0, scriptureCount: 0, level: 0,
        lastDate: null, reflections: {}, history: [],
      };
    }

    function App() {
      const [state, setState] = useState(() => loadState() || initState());
      const [tab, setTab] = useState("today");
      const [reflection, setReflection] = useState("");
      const [showReflect, setShowReflect] = useState(false);
      const [toast, setToast] = useState(null);
      const [animating, setAnimating] = useState(null);

      const today = todayKey();
      const dayOfWeek = new Date().getDay();
      const saint = SAINTS[new Date().getDate() % SAINTS.length];
      const verse = VERSES[new Date().getDate() % VERSES.length];
      const mystery = DAYS_MYSTERY[dayOfWeek] || "Joyful";

      useEffect(() => { saveState(state); }, [state]);

      function showToast(msg) {
        setToast(msg);
        setTimeout(() => setToast(null), 3000);
      }

      function toggle(id) {
        const practice = PRACTICES.find(p => p.id === id);
        const wasChecked = state.checked[today]?.[id];
        setAnimating(id);
        setTimeout(() => setAnimating(null), 600);
        setState(prev => {
          const todayChecked = { ...(prev.checked[today] || {}) };
          todayChecked[id] = !wasChecked;
          const allChecked = PRACTICES.every(p => todayChecked[p.id]);
          const newGraces = Math.max(0, prev.graces + (wasChecked ? -practice.points : practice.points));
          const level = Math.min(4, Math.floor(newGraces / 200));
          const newState = {
            ...prev,
            checked: { ...prev.checked, [today]: todayChecked },
            graces: newGraces,
            confessionCount: prev.confessionCount + (id === "confession" && !wasChecked ? 1 : 0),
            fastCount:       prev.fastCount       + (id === "fasting"    && !wasChecked ? 1 : 0),
            scriptureCount:  prev.scriptureCount  + (id === "scripture"  && !wasChecked ? 1 : 0),
            level,
          };
          if (!wasChecked && allChecked) showToast("🎉 All practices complete today! God is pleased.");
          else if (!wasChecked) showToast(`+${practice.points} Graces earned`);
          return newState;
        });
      }

      function saveReflection() {
        if (!reflection.trim()) return;
        setState(prev => ({
          ...prev,
          reflections: { ...prev.reflections, [today]: reflection },
          totalDays: prev.reflections[today] ? prev.totalDays : prev.totalDays + 1,
        }));
        showToast("Reflection saved 🙏");
        setShowReflect(false);
        setReflection("");
      }

      const todayChecked = state.checked[today] || {};
      const completedCount = PRACTICES.filter(p => todayChecked[p.id]).length;
      const progressPct = (completedCount / PRACTICES.length) * 100;
      const levelName = LEVELS[state.level];
      const levelProgress = Math.min(100, (state.graces % 200) / 2);
      const earnedBadges = BADGES.filter(b => b.condition(state));

      const tabs = [
        { id: "today",    icon: "✝️", label: "Today" },
        { id: "reflect",  icon: "📖", label: "Reflect" },
        { id: "progress", icon: "🏅", label: "Progress" },
        { id: "calendar", icon: "📅", label: "Calendar" },
      ];

      return (
        <div style={{
          minHeight: "100vh",
          background: "linear-gradient(160deg, #0d0a1e 0%, #1a1030 40%, #0f1a2e 100%)",
          fontFamily: "'Crimson Pro', Georgia, serif",
          color: "#e8dfc8",
          position: "relative",
          overflowX: "hidden",
        }}>
          {/* Ambient orbs */}
          <div className="orb" style={{ width: 400, height: 400, top: -100, right: -100, background: "rgba(200,169,110,0.06)" }} />
          <div className="orb" style={{ width: 300, height: 300, bottom: 100, left: -80, background: "rgba(100,120,200,0.07)" }} />

          {toast && <div className="toast">{toast}</div>}

          {/* Header */}
          <div style={{ padding: "28px 20px 0", textAlign: "center", position: "relative", zIndex: 1 }}>
            <div style={{ fontFamily: "'Cinzel', serif", fontSize: 11, letterSpacing: 4, color: "rgba(200,169,110,0.6)", marginBottom: 6 }}>VIA SANCTA</div>
            <div style={{ fontFamily: "'Cinzel', serif", fontSize: 22, fontWeight: 700, color: "#e8dfc8", letterSpacing: 1 }}>The Holy Way</div>

            <div style={{ display: "flex", justifyContent: "center", gap: 20, marginTop: 16 }}>
              {[
                { label: "LEVEL",  value: levelName },
                { label: "GRACES", value: state.graces },
                { label: "STREAK", value: <span><span className="streak-fire">🔥</span> {state.streak}</span> },
              ].map((item, i, arr) => (
                <React.Fragment key={item.label}>
                  <div style={{ textAlign: "center" }}>
                    <div style={{ fontFamily: "'Cinzel', serif", fontSize: 10, letterSpacing: 2, color: "rgba(200,169,110,0.5)" }}>{item.label}</div>
                    <div style={{ fontSize: 15, color: "#c8a96e", fontWeight: 600 }}>{item.value}</div>
                  </div>
                  {i < arr.length - 1 && <div style={{ width: 1, background: "rgba(200,169,110,0.2)" }} />}
                </React.Fragment>
              ))}
            </div>

            <div style={{ margin: "14px auto 0", maxWidth: 280 }}>
              <div className="progress-bar-bg" style={{ height: 4 }}>
                <div className="progress-bar-fill" style={{ width: `${levelProgress}%` }} />
              </div>
              <div style={{ fontSize: 11, color: "rgba(200,169,110,0.4)", marginTop: 4 }}>
                {state.graces % 200} / 200 to {LEVELS[Math.min(4, state.level + 1)]}
              </div>
            </div>
          </div>

          {/* Content */}
          <div style={{ padding: "20px 16px 100px", position: "relative", zIndex: 1, maxWidth: 480, margin: "0 auto" }}>

            {/* TODAY */}
            {tab === "today" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                <div className="card" style={{ borderColor: "rgba(200,169,110,0.3)", background: "rgba(200,169,110,0.07)" }}>
                  <div className="section-title">Saint of the Day</div>
                  <div style={{ fontSize: 13, fontStyle: "italic", color: "rgba(232,223,200,0.8)", lineHeight: 1.6 }}>"{saint.quote}"</div>
                  <div style={{ fontSize: 12, color: "#c8a96e", marginTop: 8 }}>— {saint.name}</div>
                </div>

                <div className="card">
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                    <div className="section-title" style={{ marginBottom: 0 }}>Today's Practices</div>
                    <div style={{ fontSize: 13, color: "#c8a96e" }}>{completedCount}/{PRACTICES.length}</div>
                  </div>
                  <div className="progress-bar-bg" style={{ height: 6, marginBottom: 16 }}>
                    <div className="progress-bar-fill" style={{ width: `${progressPct}%` }} />
                  </div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                    {PRACTICES.map(p => {
                      const done = !!todayChecked[p.id];
                      return (
                        <button
                          key={p.id}
                          className={`check-btn${done ? " done" : ""}${animating === p.id ? " pulse" : ""}`}
                          onClick={() => toggle(p.id)}
                        >
                          <div className={`checkmark${done ? " done" : ""}`}>{done ? "✓" : ""}</div>
                          <span style={{ fontSize: 20 }}>{p.icon}</span>
                          <div style={{ flex: 1 }}>
                            <div style={{ fontSize: 15, fontWeight: done ? 600 : 400, color: done ? "#c8a96e" : "#e8dfc8" }}>{p.label}</div>
                            {p.id === "rosary" && (
                              <div style={{ fontSize: 11, color: "rgba(200,169,110,0.6)", marginTop: 1 }}>{mystery} Mysteries today</div>
                            )}
                          </div>
                          <div style={{ fontSize: 11, color: "rgba(200,169,110,0.5)" }}>+{p.points}</div>
                        </button>
                      );
                    })}
                  </div>
                </div>

                <div className="card" style={{ background: "rgba(100,120,200,0.07)", borderColor: "rgba(100,120,200,0.2)" }}>
                  <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
                    <span style={{ fontSize: 28 }}>🕊️</span>
                    <div>
                      <div style={{ fontSize: 14, color: "#a0b4d4", fontFamily: "'Cinzel', serif", letterSpacing: 1 }}>Examination of Conscience</div>
                      <div style={{ fontSize: 13, color: "rgba(160,180,212,0.7)", marginTop: 2 }}>
                        {state.confessionCount === 0 ? "Haven't logged Confession yet" : `Logged ${state.confessionCount} time${state.confessionCount > 1 ? "s" : ""}`}
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* REFLECT */}
            {tab === "reflect" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                <div className="card" style={{ borderColor: "rgba(137,176,140,0.3)", background: "rgba(137,176,140,0.07)", textAlign: "center" }}>
                  <div style={{ fontSize: 28, marginBottom: 10 }}>✦</div>
                  <div style={{ fontSize: 17, fontStyle: "italic", lineHeight: 1.7, color: "#e8dfc8" }}>"{verse.text}"</div>
                  <div style={{ fontSize: 13, color: "#89b08c", marginTop: 10 }}>— {verse.ref}</div>
                </div>

                <div className="card">
                  <div className="section-title">Daily Reflection</div>
                  <div style={{ fontSize: 14, color: "rgba(232,223,200,0.7)", marginBottom: 16, fontStyle: "italic", lineHeight: 1.6 }}>
                    "How did you see God in your day today? Where did you feel His presence or resist His grace?"
                  </div>
                  {state.reflections[today] && !showReflect ? (
                    <div>
                      <div style={{ fontSize: 14, lineHeight: 1.7, color: "rgba(232,223,200,0.85)", padding: "12px 0", borderTop: "1px solid rgba(200,169,110,0.15)" }}>
                        {state.reflections[today]}
                      </div>
                      <button className="btn-gold" style={{ marginTop: 12, width: "100%" }}
                        onClick={() => { setReflection(state.reflections[today]); setShowReflect(true); }}>
                        Edit Reflection
                      </button>
                    </div>
                  ) : (
                    <div>
                      <textarea rows={5} placeholder="Write your reflection here..." value={reflection} onChange={e => setReflection(e.target.value)} />
                      <button className="btn-gold" style={{ marginTop: 12, width: "100%" }} onClick={saveReflection}>Save Reflection</button>
                    </div>
                  )}
                </div>

                {Object.entries(state.reflections).filter(([d]) => d !== today).length > 0 && (
                  <div className="card">
                    <div className="section-title">Past Reflections</div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                      {Object.entries(state.reflections)
                        .filter(([d]) => d !== today)
                        .sort((a, b) => b[0].localeCompare(a[0]))
                        .slice(0, 5)
                        .map(([date, text]) => (
                          <div key={date} style={{ borderTop: "1px solid rgba(200,169,110,0.1)", paddingTop: 12 }}>
                            <div style={{ fontSize: 11, color: "rgba(200,169,110,0.5)", marginBottom: 4, fontFamily: "'Cinzel', serif", letterSpacing: 1 }}>
                              {new Date(date + "T12:00:00").toLocaleDateString("en-US", { month: "long", day: "numeric" })}
                            </div>
                            <div style={{ fontSize: 13, color: "rgba(232,223,200,0.7)", lineHeight: 1.6 }}>{text}</div>
                          </div>
                        ))}
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* PROGRESS */}
            {tab === "progress" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                <div className="card">
                  <div className="section-title">Spiritual Journey</div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                    {[
                      { label: "Days of Grace",  value: state.totalDays },
                      { label: "Current Streak", value: `🔥 ${state.streak}` },
                      { label: "Graces Earned",  value: state.graces },
                      { label: "Confessions",    value: state.confessionCount },
                      { label: "Fasts",          value: state.fastCount },
                      { label: "Scripture Days", value: state.scriptureCount },
                    ].map(stat => (
                      <div key={stat.label} style={{ background: "rgba(255,255,255,0.04)", borderRadius: 10, padding: "12px 14px" }}>
                        <div style={{ fontSize: 11, color: "rgba(200,169,110,0.5)", marginBottom: 4, fontFamily: "'Cinzel', serif", letterSpacing: 1 }}>{stat.label}</div>
                        <div style={{ fontSize: 22, color: "#c8a96e" }}>{stat.value}</div>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="card">
                  <div className="section-title">Achievements</div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                    {BADGES.map(b => (
                      <div key={b.id} className={`badge-pill${b.condition(state) ? "" : " locked"}`} title={b.desc}>
                        <span>{b.icon}</span>
                        <span style={{ fontFamily: "'Cinzel', serif", fontSize: 11, letterSpacing: 0.5 }}>{b.name}</span>
                      </div>
                    ))}
                  </div>
                  <div style={{ fontSize: 12, color: "rgba(200,169,110,0.4)", marginTop: 12, fontStyle: "italic" }}>
                    {earnedBadges.length} of {BADGES.length} achievements unlocked
                  </div>
                </div>

                <div className="card">
                  <div className="section-title">The Path of Holiness</div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                    {LEVELS.map((l, i) => (
                      <div key={l} style={{ display: "flex", alignItems: "center", gap: 12 }}>
                        <div style={{
                          width: 32, height: 32, borderRadius: "50%",
                          background: i <= state.level ? "linear-gradient(135deg, #c8a96e, #a8874e)" : "rgba(255,255,255,0.07)",
                          border: `2px solid ${i <= state.level ? "#c8a96e" : "rgba(200,169,110,0.2)"}`,
                          display: "flex", alignItems: "center", justifyContent: "center",
                          fontSize: 13, color: i <= state.level ? "#0d0a1e" : "rgba(200,169,110,0.3)", fontWeight: 700,
                        }}>{i <= state.level ? "✓" : i + 1}</div>
                        <div>
                          <div style={{ fontFamily: "'Cinzel', serif", fontSize: 14, color: i <= state.level ? "#c8a96e" : "rgba(232,223,200,0.4)" }}>{l}</div>
                          <div style={{ fontSize: 11, color: "rgba(200,169,110,0.35)" }}>{i * 200} Graces</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* CALENDAR */}
            {tab === "calendar" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                <div className="card" style={{ background: "rgba(180,120,80,0.08)", borderColor: "rgba(180,120,80,0.3)", textAlign: "center" }}>
                  <div style={{ fontSize: 32, marginBottom: 8 }}>🌿</div>
                  <div style={{ fontFamily: "'Cinzel', serif", fontSize: 15, color: "#d4956a", letterSpacing: 2 }}>ORDINARY TIME</div>
                  <div style={{ fontSize: 13, color: "rgba(212,149,106,0.7)", marginTop: 6, fontStyle: "italic" }}>A season of growth and discipleship</div>
                </div>

                <div className="card">
                  <div className="section-title">Rosary Mysteries This Week</div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                    {[
                      { day: "Sunday", m: "Glorious" }, { day: "Monday", m: "Joyful" },
                      { day: "Tuesday", m: "Sorrowful" }, { day: "Wednesday", m: "Glorious" },
                      { day: "Thursday", m: "Luminous" }, { day: "Friday", m: "Sorrowful" },
                      { day: "Saturday", m: "Joyful" },
                    ].map(({ day, m }) => {
                      const isToday = day === new Date().toLocaleDateString("en-US", { weekday: "long" });
                      return (
                        <div key={day} style={{
                          display: "flex", justifyContent: "space-between", alignItems: "center",
                          padding: "8px 12px", borderRadius: 8,
                          background: isToday ? "rgba(200,169,110,0.12)" : "transparent",
                          border: `1px solid ${isToday ? "rgba(200,169,110,0.3)" : "transparent"}`,
                        }}>
                          <span style={{ fontSize: 14, color: isToday ? "#c8a96e" : "rgba(232,223,200,0.6)" }}>{day}</span>
                          <span style={{ fontSize: 13, color: isToday ? "#e8dfc8" : "rgba(232,223,200,0.4)", fontStyle: "italic" }}>{m} Mysteries</span>
                        </div>
                      );
                    })}
                  </div>
                </div>

                <div className="card">
                  <div className="section-title">Upcoming Feast Days</div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                    {[
                      { date: "Apr 2",  name: "St. Francis of Paola",         icon: "⚓" },
                      { date: "Apr 5",  name: "St. Vincent Ferrer",            icon: "✝️" },
                      { date: "Apr 7",  name: "St. John Baptist de la Salle",  icon: "📚" },
                      { date: "Apr 11", name: "St. Stanislaus",                icon: "🏛️" },
                      { date: "Apr 23", name: "St. George, Martyr",            icon: "🐉" },
                    ].map(f => (
                      <div key={f.date} style={{ display: "flex", gap: 12, alignItems: "center" }}>
                        <div style={{ width: 40, textAlign: "center", fontFamily: "'Cinzel', serif", fontSize: 10, color: "#c8a96e", letterSpacing: 0.5, flexShrink: 0 }}>{f.date}</div>
                        <span style={{ fontSize: 18 }}>{f.icon}</span>
                        <div style={{ fontSize: 14, color: "rgba(232,223,200,0.8)" }}>{f.name}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}
          </div>

          {/* Bottom nav */}
          <div style={{
            position: "fixed", bottom: 0, left: 0, right: 0, zIndex: 10,
            background: "rgba(13,10,30,0.95)", backdropFilter: "blur(20px)",
            borderTop: "1px solid rgba(200,169,110,0.15)",
            display: "flex",
          }}>
            <div style={{ display: "flex", width: "100%", maxWidth: 480, margin: "0 auto" }}>
              {tabs.map(t => (
                <button key={t.id} className={`tab-btn${tab === t.id ? " active" : ""}`} onClick={() => setTab(t.id)}>
                  <span>{t.icon}</span>
                  <span>{t.label}</span>
                </button>
              ))}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
